<!DOCTYPE html>
<html>
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap"
      rel="stylesheet"
    />
    <title>Content Reader Extension</title>
    <script src="popup.js"></script>
  </head>
  <body>
    <!-- <p id="result"></p> -->
    <div class="card" style="width: 18rem">
      <div class="card-body">
        <h4 class="card-title"><b>Bias Detector</b></h4>
        <h6 class="card-subtitle mb-2" id="title">
          Analysing text, please wait....
        </h6>
        <div id="spinner" class="spinner-border m-5" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p id="result"></p>
      </div>
      <div id="x-box"></div>
      <p id="labels">
        <b>Labels:</b>
        <strong style="color: #1D267D" id="left"></strong>
        <strong style="color: #feec1e" id="center"></strong>
        <strong style="color: #ff264a" id="right"></strong>
      </p>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
